<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}}</title>
<link rel="stylesheet" href="/assets/github-markdown.css">
<link rel="stylesheet" href="/assets/highlight.css">
<link rel="stylesheet" href="/assets/theme.css">
<style>
body { box-sizing: border-box; min-width: 200px; max-width: 980px; margin: 0 auto; padding: 45px; }
</style>
</head>
<body>
{{if .Breadcrumbs}}
<nav class="breadcrumb">
{{range .Breadcrumbs}}<a href="{{.URL}}">{{.Label}}</a> / {{end}}
</nav>
{{end}}
{{if .DirListURL}}
<div class="dir-list-link">
  <a href="{{.DirListURL}}">ファイル一覧を表示</a>
</div>
{{end}}
<article class="markdown-body">
{{.Content}}
</article>
<script src="/assets/mermaid.min.js"></script>
<script>mermaid.initialize({ startOnLoad: true });</script>
{{if .LiveReload}}
<script>
(function() {
  var sse = new EventSource('/events');
  sse.onmessage = function(e) {
    if (e.data === 'reload') { sse.close(); location.reload(); }
  };
  window.addEventListener('pagehide', function() { sse.close(); });
})();
</script>
{{end}}
</body>
</html>
