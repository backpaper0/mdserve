<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}}</title>
<link rel="stylesheet" href="/assets/github-markdown.css">
<style>
body { box-sizing: border-box; min-width: 200px; max-width: 980px; margin: 0 auto; padding: 45px; }
nav.breadcrumb { margin-bottom: 1em; font-size: 0.9em; color: #586069; }
nav.breadcrumb a { color: #0366d6; text-decoration: none; }
nav.breadcrumb a:hover { text-decoration: underline; }
</style>
</head>
<body>
{{if .Breadcrumbs}}
<nav class="breadcrumb">
{{range .Breadcrumbs}}<a href="{{.URL}}">{{.Label}}</a> / {{end}}
</nav>
{{end}}
{{if .IndexURL}}
<div class="dir-list-link">
  <a href="{{.IndexURL}}">README を表示</a>
</div>
{{end}}
<article class="markdown-body">
<h1>{{.Title}}</h1>
<ul>
{{range .Entries}}
<li><a href="{{.Path}}">{{if .IsDir}}[dir] {{end}}{{.Name}}</a></li>
{{end}}
</ul>
</article>
{{if .LiveReload}}
<script>
(function() {
  var sse = new EventSource('/events');
  sse.onmessage = function(e) {
    if (e.data === 'reload') { sse.close(); location.reload(); }
  };
  window.addEventListener('pagehide', function() { sse.close(); });
})();
</script>
{{end}}
</body>
</html>
