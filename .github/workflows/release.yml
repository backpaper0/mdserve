name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: mdserve-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: mdserve-linux-arm64
          - goos: darwin
            goarch: amd64
            asset_name: mdserve-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: mdserve-darwin-arm64
          - goos: windows
            goarch: amd64
            asset_name: mdserve-windows-amd64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o ${{ matrix.asset_name }} ./cmd/mdserve/

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 1

  release:
    name: Create draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
